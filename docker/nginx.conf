# keeBLEr nginx configuration

resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 16M;

    # Static web app
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache";
    }

    # Reverse proxy to C64 Ultimate (or any LAN device) HTTP API.
    # URL format: /c64proxy/<ip>/<path>
    # Example:    /c64proxy/192.168.50.193/v1/info
    #          -> http://192.168.50.193/v1/info
    location ~ ^/c64proxy/(?<target_host>[0-9.]+)/(?<target_path>.*)$ {
        proxy_pass http://$target_host/$target_path$is_args$args;
        proxy_set_header Host $target_host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # CORS — allow browser JS to use this proxy
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    add_header Service-Worker-Allowed "/";
}

server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}
