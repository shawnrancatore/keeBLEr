# SPDX-License-Identifier: MIT
#
# keeBLEr web server — two profiles:
#
#   Development (self-signed cert):
#     docker compose up -d
#
#   Production (Let's Encrypt):
#     KEEBLER_DOMAIN=keebler.example.com KEEBLER_EMAIL=you@example.com \
#       docker compose --profile production up -d

services:

  # ---------- Development: self-signed cert ----------
  keebler-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${KEEBLER_PORT_HTTPS:-8443}:443"
      - "${KEEBLER_PORT_HTTP:-8080}:80"
    volumes:
      - ../web:/usr/share/nginx/html:ro
      - ./certs:/etc/nginx/certs:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  # ---------- Production: Let's Encrypt via Caddy ----------
  keebler-production:
    image: caddy:2-alpine
    profiles: ["production"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../web:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - KEEBLER_DOMAIN=${KEEBLER_DOMAIN:-localhost}
      - KEEBLER_EMAIL=${KEEBLER_EMAIL:-}
    command: >
      sh -c 'cat > /etc/caddy/Caddyfile <<CADDYEOF
      $${KEEBLER_DOMAIN} {
        root * /srv
        file_server
        encode gzip

        header {
          Service-Worker-Allowed "/"
          Strict-Transport-Security "max-age=31536000; includeSubDomains"
        }

        $${KEEBLER_EMAIL:+tls $${KEEBLER_EMAIL}}
      }
      CADDYEOF
      caddy run --config /etc/caddy/Caddyfile'
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
